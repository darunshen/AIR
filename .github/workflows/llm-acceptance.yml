name: llm-acceptance

on:
  workflow_call:
    inputs:
      planner:
        description: "Planner provider"
        required: true
        type: string
      model:
        description: "Planner model"
        required: true
        type: string
      escalation_model:
        description: "Planner escalation model"
        required: false
        type: string
        default: ""
      planner_retries:
        description: "Planner retries before escalation"
        required: false
        type: string
        default: "1"
      tasks:
        description: "Comma-separated task list"
        required: false
        type: string
        default: "run-smoke,session-workflow,test-and-fix,repo-bugfix"
      runtime_provider:
        description: "AIR runtime provider"
        required: false
        type: string
        default: "local"
      firecracker_assets_dir:
        description: "Firecracker asset directory for workflow runs"
        required: false
        type: string
        default: "artifacts/firecracker"
      upload_artifact:
        description: "Whether to upload go test output"
        required: false
        type: boolean
        default: true
      allow_missing_secret:
        description: "Skip acceptance instead of failing when planner secret is missing"
        required: false
        type: boolean
        default: false
    secrets:
      OPENAI_API_KEY:
        required: false
      DEEPSEEK_API_KEY:
        required: false

  workflow_dispatch:
    inputs:
      planner:
        description: "Planner provider"
        required: true
        default: "deepseek"
        type: choice
        options:
          - deepseek
          - openai
      model:
        description: "Planner model"
        required: true
        default: "deepseek-chat"
        type: string
      escalation_model:
        description: "Planner escalation model"
        required: false
        default: "deepseek-reasoner"
        type: string
      planner_retries:
        description: "Planner retries before escalation"
        required: true
        default: "1"
        type: string
      tasks:
        description: "Comma-separated task list"
        required: true
        default: "run-smoke,session-workflow,test-and-fix,repo-bugfix"
        type: string
      runtime_provider:
        description: "AIR runtime provider"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - firecracker
      firecracker_assets_dir:
        description: "Firecracker asset directory for workflow runs"
        required: true
        default: "artifacts/firecracker"
        type: string
      upload_artifact:
        description: "Upload go test output artifact"
        required: true
        default: true
        type: boolean
      allow_missing_secret:
        description: "Skip acceptance instead of failing when planner secret is missing"
        required: true
        default: false
        type: boolean

jobs:
  acceptance:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Firecracker prep tools
        if: ${{ inputs.runtime_provider == 'firecracker' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Validate planner secret
        id: planner-secret
        env:
          PLANNER: ${{ inputs.planner }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALLOW_MISSING_SECRET: ${{ inputs.allow_missing_secret }}
        run: |
          set -euo pipefail
          has_secret=""
          case "${PLANNER}" in
            openai)
              has_secret="${OPENAI_API_KEY}"
              ;;
            deepseek)
              has_secret="${DEEPSEEK_API_KEY}"
              ;;
            *)
              echo "unsupported planner: ${PLANNER}" >&2
              exit 1
              ;;
          esac

          if [[ -n "${has_secret}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${ALLOW_MISSING_SECRET}" == "true" ]]; then
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "planner secret is missing; skipping LLM acceptance"
            exit 0
          fi

          echo "missing planner secret for ${PLANNER}" >&2
          exit 1

      - name: Validate Firecracker host prerequisites
        id: firecracker-host
        if: ${{ inputs.runtime_provider == 'firecracker' && steps.planner-secret.outputs.available == 'true' }}
        env:
          FIRECRACKER_ASSETS_DIR: ${{ inputs.firecracker_assets_dir }}
        run: |
          set -euo pipefail
          if [[ "$(uname -s)" != "Linux" ]]; then
            echo "firecracker provider requires a Linux runner" >&2
            exit 1
          fi
          if [[ ! -e /dev/kvm ]]; then
            echo "firecracker provider requires /dev/kvm; GitHub-hosted runners usually do not expose KVM. Use a self-hosted Linux runner with KVM enabled." >&2
            exit 1
          fi
          if [[ ! -r /dev/kvm || ! -w /dev/kvm ]]; then
            echo "firecracker provider requires read/write access to /dev/kvm" >&2
            exit 1
          fi
          mkdir -p "${FIRECRACKER_ASSETS_DIR}"
          echo "assets_dir=${FIRECRACKER_ASSETS_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Prepare Firecracker assets
        if: ${{ inputs.runtime_provider == 'firecracker' && steps.planner-secret.outputs.available == 'true' }}
        env:
          FIRECRACKER_ASSETS_DIR: ${{ steps.firecracker-host.outputs.assets_dir }}
        run: |
          set -euo pipefail
          ./scripts/fetch-firecracker-demo-assets.sh "${FIRECRACKER_ASSETS_DIR}"
          ./scripts/prepare-firecracker-rootfs.sh \
            "${FIRECRACKER_ASSETS_DIR}/hello-rootfs.ext4" \
            "${FIRECRACKER_ASSETS_DIR}/hello-rootfs-air.ext4"

      - name: Run real LLM acceptance test
        if: ${{ steps.planner-secret.outputs.available == 'true' }}
        env:
          AIR_LLM_ACCEPTANCE: "1"
          AIR_AGENT_PROVIDER: ${{ inputs.planner }}
          AIR_AGENT_MODEL: ${{ inputs.model }}
          AIR_AGENT_ESCALATION_MODEL: ${{ inputs.escalation_model }}
          AIR_AGENT_PLANNER_RETRIES: ${{ inputs.planner_retries }}
          AIR_AGENT_ACCEPTANCE_TASKS: ${{ inputs.tasks }}
          AIR_AGENT_RUNTIME_PROVIDER: ${{ inputs.runtime_provider }}
          AIR_AGENT_ACCEPTANCE_ARTIFACT_DIR: artifacts/github-actions/llm-acceptance
          AIR_AGENT_TRACE: "1"
          AIR_FIRECRACKER_BIN: ${{ steps.firecracker-host.outputs.assets_dir }}/firecracker
          AIR_FIRECRACKER_KERNEL: ${{ steps.firecracker-host.outputs.assets_dir }}/hello-vmlinux.bin
          AIR_FIRECRACKER_ROOTFS: ${{ steps.firecracker-host.outputs.assets_dir }}/hello-rootfs-air.ext4
          AIR_KVM_DEVICE: /dev/kvm
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p artifacts/github-actions/llm-acceptance
          go test ./examples/agent-runner -run TestRealLLMAgentWorkflowAcceptance -v | tee artifacts/github-actions/llm-acceptance/llm-acceptance.log

      - name: Upload acceptance log
        if: ${{ inputs.upload_artifact && steps.planner-secret.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: llm-acceptance-${{ inputs.planner }}-${{ inputs.runtime_provider }}
          path: artifacts/github-actions/llm-acceptance/
